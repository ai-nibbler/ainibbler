# Build Vite app and deploy dist/ to GitHub Pages (works with a custom domain).
#
# After merge: Repo → Settings → Pages → Build and deployment → Source: GitHub Actions
# (not “Deploy from a branch”). Custom domain stays under Pages → Custom domain.
#
# Optional repo secret (Settings → Secrets → Actions):
#   VITE_AI_PROJECT_PANTRY_URL — public URL of the AI Project Pantry site (no secrets in repo).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_AI_PROJECT_PANTRY_URL: ${{ secrets.VITE_AI_PROJECT_PANTRY_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
